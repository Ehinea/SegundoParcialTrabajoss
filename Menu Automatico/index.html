<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style_menu.css">
    <title>Menú | El Capibara Azul</title>
</head>
<body>
 
 
    <h1>☕ Menú Digital</h1>
    
    <main id="galeria"></main>
 
 
    <script>
        // 1. LA BASE DE DATOS (El Arreglo de Objetos)
        const productosCapibara = [
            {
                nombre: "Capuchino Clásico",
                precio: 55,
                categoria: "Caliente",
                imagen: "https://images.unsplash.com/photo-1534778101976-62847782c213?w=300&q=80"
            },
            {
                nombre: "Frappé de Matcha",
                precio: 85,
                categoria: "Frío",
                imagen: "https://images.unsplash.com/photo-1536514072410-5019a3c69182?w=300&q=80"
            },
            {
                nombre: "Panini de Tres Quesos",
                precio: 120,
                categoria: "Alimentos",
                imagen: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=300&q=80"
            },
            {
                nombre: "Pastel de chocolate",
                precio: 140,
                categoria: "Postre",
                imagen: "https://sarasellos.com/wp-content/uploads/2024/06/pastel-chocolate-oscuro-1-1024x1024.jpg"
            },
            {
                nombre: "Cholate frío",
                precio: 70,
                categoria: "Frío",
                imagen: "https://www.menudospeques.net/images/cocinaynutricion/cafe-frio-chocolate.jpg"
            }
            
        ];
 
 
        // 2. EL CONTENEDOR (Donde vamos a pintar)
        let contenedor = document.getElementById("galeria");
 
 
        // 3. TU MISIÓN: Escribe el ciclo forEach aquí abajo para imprimir las 3 tarjetas en pantalla
        // RECUERDA: Usa contenedor.innerHTML += ` HTML AQUÍ `;

        productosCapibara.forEach(function(item) {
        //Diseñamos la tarjeta una sola vez
        let tarjeta = `
        <div>
            <h3>${item.nombre}</h3>
            <p>$${item.precio}</p>
            <img src= ${item.imagen}>
        </div>
    `;
    // La inyectamos en el HTML
     document.getElementById("galeria").innerHTML += tarjeta;
    });
    </script>
    
   
</body>
</html>
